<svg width="960" height="520" viewBox="0 0 960 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="520" rx="18" fill="#F8FAFF"/>
  <rect x="28" y="28" width="904" height="464" rx="14" fill="#FFFFFF" stroke="#CCD6E6" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="56" y="70" fill="#1664FF" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="800">Pencil 草图</text>
  <text x="56" y="104" fill="#1F2329" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="28" font-weight="900">优先级筛选方案蓝图</text>

  <g filter="url(#shadow)">
    <rect x="70" y="150" width="170" height="118" rx="12" fill="#EEF4FF" stroke="#8FB4FF" stroke-width="2"/>
    <text x="94" y="186" fill="#1F2329" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="900">Task 数据结构</text>
    <text x="94" y="219" fill="#4E5969" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15">新增 priority 字段</text>
    <text x="94" y="245" fill="#4E5969" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15">high / medium / low</text>
  </g>

  <path d="M250 209 C280 191, 306 191, 334 209" stroke="#1664FF" stroke-width="3" stroke-linecap="round"/>
  <path d="M324 197 L336 209 L323 220" stroke="#1664FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="350" y="150" width="170" height="118" rx="12" fill="#F0FBFF" stroke="#73D5FF" stroke-width="2"/>
    <text x="374" y="186" fill="#1F2329" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="900">筛选控件</text>
    <text x="374" y="219" fill="#4E5969" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15">全部 / 高 / 中 / 低</text>
    <text x="374" y="245" fill="#4E5969" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15">Segmented Filter</text>
  </g>

  <path d="M530 209 C560 191, 586 191, 614 209" stroke="#1664FF" stroke-width="3" stroke-linecap="round"/>
  <path d="M604 197 L616 209 L603 220" stroke="#1664FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="630" y="150" width="170" height="118" rx="12" fill="#F4F8F2" stroke="#9ED08B" stroke-width="2"/>
    <text x="654" y="186" fill="#1F2329" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="900">列表过滤</text>
    <text x="654" y="219" fill="#4E5969" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15">按 priorityFilter</text>
    <text x="654" y="245" fill="#4E5969" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15">过滤任务集合</text>
  </g>

  <path d="M715 278 C715 315, 715 332, 715 360" stroke="#1664FF" stroke-width="3" stroke-linecap="round"/>
  <path d="M703 348 L715 362 L727 348" stroke="#1664FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="630" y="376" width="170" height="92" rx="12" fill="#FFF7ED" stroke="#FFC078" stroke-width="2"/>
    <text x="654" y="411" fill="#1F2329" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="900">空状态</text>
    <text x="654" y="442" fill="#4E5969" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15">无匹配任务时提示</text>
  </g>

  <rect x="70" y="332" width="450" height="136" rx="12" fill="#FFF9DB" stroke="#FFD43B" stroke-width="2"/>
  <text x="94" y="368" fill="#8A5A00" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17" font-weight="900">审批关注点</text>
  <text x="94" y="401" fill="#8A5A00" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15">1. 筛选条件需要和搜索、排序共存</text>
  <text x="94" y="431" fill="#8A5A00" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15">2. priority 字段需要默认值，避免旧数据异常</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1F2329" flood-opacity="0.12"/>
    </filter>
  </defs>
</svg>
