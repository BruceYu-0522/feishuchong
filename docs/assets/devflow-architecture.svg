<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="1" stop-color="#102A43"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <style>
      .title{font:700 34px Arial,'Microsoft YaHei',sans-serif;fill:#F8FAFC}
      .sub{font:400 17px Arial,'Microsoft YaHei',sans-serif;fill:#B9C8D8}
      .h{font:700 22px Arial,'Microsoft YaHei',sans-serif;fill:#FFFFFF}
      .t{font:400 16px Arial,'Microsoft YaHei',sans-serif;fill:#D8E2EE}
      .mini{font:400 14px Arial,'Microsoft YaHei',sans-serif;fill:#9FB3C8}
      .pill{font:700 14px Arial,'Microsoft YaHei',sans-serif;fill:#0B1220}
      .line{stroke:#6EE7B7;stroke-width:3;stroke-linecap:round;stroke-dasharray:8 10}
    </style>
  </defs>
  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <circle cx="1030" cy="120" r="150" fill="#22D3EE" opacity="0.10"/>
  <circle cx="180" cy="520" r="180" fill="#34D399" opacity="0.10"/>
  <text x="64" y="72" class="title">DevFlow Engine 架构总览</text>
  <text x="64" y="106" class="sub">以 Pipeline 为流程骨架，以 AI Agent 为阶段执行者，以人工检查点保证交付质量</text>

  <g filter="url(#shadow)">
    <rect x="64" y="164" width="290" height="280" rx="18" fill="url(#card)" stroke="#2D4D6E"/>
    <rect x="96" y="198" width="116" height="30" rx="15" fill="#6EE7B7"/>
    <text x="116" y="218" class="pill">用户入口</text>
    <text x="96" y="264" class="h">Web 控制台</text>
    <text x="96" y="302" class="t">自然语言需求输入</text>
    <text x="96" y="332" class="t">阶段产物审阅</text>
    <text x="96" y="362" class="t">Approve / Reject 决策</text>
    <text x="96" y="392" class="mini">包含可视化阶段轮盘、产物预览、工作区文件查看</text>
  </g>

  <path d="M370 304 C430 304 438 304 498 304" class="line"/>
  <polygon points="500,304 482,294 482,314" fill="#6EE7B7"/>

  <g filter="url(#shadow)">
    <rect x="506" y="132" width="330" height="344" rx="18" fill="url(#card)" stroke="#2D4D6E"/>
    <rect x="538" y="166" width="132" height="30" rx="15" fill="#93C5FD"/>
    <text x="557" y="186" class="pill">API-First</text>
    <text x="538" y="230" class="h">FastAPI Pipeline Engine</text>
    <text x="538" y="270" class="t">阶段定义 / 依赖 / 生命周期</text>
    <text x="538" y="300" class="t">SSE 实时流式输出</text>
    <text x="538" y="330" class="t">审批回退与最大重试限制</text>
    <text x="538" y="360" class="t">代码索引、统计、导出接口</text>
    <rect x="538" y="398" width="250" height="42" rx="10" fill="#0B1220" stroke="#35526F"/>
    <text x="558" y="424" class="mini">Swagger / OpenAPI 自动文档</text>
  </g>

  <path d="M850 304 C905 304 920 304 976 304" class="line"/>
  <polygon points="978,304 960,294 960,314" fill="#6EE7B7"/>

  <g filter="url(#shadow)">
    <rect x="986" y="164" width="150" height="280" rx="18" fill="url(#card)" stroke="#2D4D6E"/>
    <rect x="1016" y="198" width="90" height="30" rx="15" fill="#FDE68A"/>
    <text x="1035" y="218" class="pill">Agent</text>
    <text x="1018" y="264" class="h">LLM 执行层</text>
    <text x="1018" y="304" class="t">需求分析</text>
    <text x="1018" y="334" class="t">方案设计</text>
    <text x="1018" y="364" class="t">代码与测试</text>
    <text x="1018" y="394" class="t">多维评审</text>
  </g>

  <g>
    <rect x="256" y="502" width="688" height="56" rx="16" fill="#0B1220" stroke="#35526F"/>
    <text x="300" y="536" class="t">目标代码库 / devflow-runs 工作区 / Git 分支与提交 / 可下载交付包</text>
  </g>
</svg>
