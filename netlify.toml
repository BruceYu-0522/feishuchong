[build]
  publish = "."

[[redirects]]
  from = "/backend/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"
